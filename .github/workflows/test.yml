name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Cache uv environment
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/uv
          .venv
        key: ${{ runner.os }}-uv-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          ${{ runner.os }}-uv-py${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run linter
      run: |
        uv run ruff check src/mcp_read_only_argocd/ tests/ smoke_test.py

    - name: Run tests
      run: |
        uv run pytest -m "not integration" --junitxml=test-results/junit.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results-py${{ matrix.python-version }}
        path: |
          test-results/
        if-no-files-found: ignore

  package-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Build package artifacts
      run: |
        uv build

    - name: Smoke test wheel
      run: |
        tmp_dir="$(mktemp -d)"
        uvx --from dist/*.whl mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        uvx --from dist/*.whl mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths

    - name: Smoke test sdist
      run: |
        tmp_dir="$(mktemp -d)"
        uvx --from dist/*.tar.gz mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        uvx --from dist/*.tar.gz mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths
