name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-read-only-argocd

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Validate tag matches package version
      run: |
        package_version="$(python -c 'import tomllib; from pathlib import Path; print(tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"
        tag_version="${GITHUB_REF_NAME#v}"

        if [ "$package_version" != "$tag_version" ]; then
          echo "Tag version $tag_version does not match pyproject.toml version $package_version" >&2
          exit 1
        fi

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run tests
      run: |
        uv run pytest -q

    - name: Build package artifacts
      run: |
        uv build

    - name: Smoke test wheel
      run: |
        tmp_dir="$(mktemp -d)"
        uvx --from dist/*.whl mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        uvx --from dist/*.whl mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths

    - name: Smoke test sdist
      run: |
        tmp_dir="$(mktemp -d)"
        uvx --from dist/*.tar.gz mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --write-sample-config
        test -f "$tmp_dir/config/connections.yaml"
        uvx --from dist/*.tar.gz mcp-read-only-argocd \
          --config-dir "$tmp_dir/config" \
          --state-dir "$tmp_dir/state" \
          --cache-dir "$tmp_dir/cache" \
          --print-paths

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
